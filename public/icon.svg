<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#0b0f19"/>

  <!-- Gradient overlay -->
  <rect width="512" height="512" rx="128" fill="url(#gradient)" opacity="0.6"/>

  <!-- Document icon -->
  <g transform="translate(128, 96)">
    <!-- Document shape -->
    <path d="M 0 0 L 180 0 L 256 76 L 256 320 L 0 320 Z" fill="rgba(255, 255, 255, 0.1)" stroke="rgba(139, 92, 246, 0.8)" stroke-width="4" />

    <!-- Document corner fold -->
    <path d="M 180 0 L 180 76 L 256 76" fill="rgba(255, 255, 255, 0.05)" stroke="rgba(139, 92, 246, 0.6)" stroke-width="4" />

    <!-- Lines representing text -->
    <line x1="40" y1="120" x2="216" y2="120" stroke="rgba(6, 182, 212, 0.7)" stroke-width="6" stroke-linecap="round"/>
    <line x1="40" y1="160" x2="180" y2="160" stroke="rgba(139, 92, 246, 0.6)" stroke-width="6" stroke-linecap="round"/>
    <line x1="40" y1="200" x2="200" y2="200" stroke="rgba(6, 182, 212, 0.5)" stroke-width="6" stroke-linecap="round"/>
    <line x1="40" y1="240" x2="160" y2="240" stroke="rgba(139, 92, 246, 0.5)" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- AI spark icon -->
  <g transform="translate(340, 360)">
    <circle cx="0" cy="0" r="32" fill="rgba(6, 182, 212, 0.9)"/>
    <path d="M -12 -12 L 0 0 L 12 -12 M 12 12 L 0 0 L -12 12 M 12 0 L 0 0 L 12 0 M -12 0 L 0 0 L -12 0"
          stroke="white" stroke-width="3" stroke-linecap="round"/>
  </g>

  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:0.3" />
    </linearGradient>
  </defs>
</svg>
